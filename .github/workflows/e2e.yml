name: E2E

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    # PR pipeline stays fast: this suite runs only on main merges or PRs labeled 'e2e'
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install server
        run: pip install -e "server[dev]"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            e2e/package-lock.json
      - name: Install web deps
        run: npm ci
        working-directory: web
      - name: Install e2e deps
        run: npm ci
        working-directory: e2e
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e
      - name: Run Playwright suite
        run: npx playwright test
        working-directory: e2e
        env:
          E2E_PYTHON: python
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: ignore
