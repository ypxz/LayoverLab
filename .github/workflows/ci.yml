name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e "server[dev]"
      - name: Lint
        run: ruff check server
      - name: Test (with coverage)
        run: pytest server/tests -q --cov=layoverlab --cov-report=term --cov-report=xml:server-coverage.xml | tee pytest-cov.txt
      - name: Coverage summary
        if: always()
        run: |
          {
            echo "### Server coverage"
            echo '```'
            grep -E "^(TOTAL|Name|-+)" pytest-cov.txt || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: server-coverage.xml
          if-no-files-found: ignore
      - name: OpenAPI schema up to date
        run: |
          python server/scripts/export_openapi.py
          git diff --exit-code openapi.json

  prod-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build server prod image
        run: docker build -f server/Dockerfile.prod server
      - name: Build web prod image
        run: docker build -f web/Dockerfile.prod web

  route-matrix:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///layoverlab.sqlite3
      FIXTURE_CONNECTOR: "true"
      CRAWL_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e "server[dev]"
      - name: Migrate
        run: alembic upgrade head
        working-directory: server
      - name: Start fixture API
        run: |
          nohup python -m uvicorn layoverlab.api.app:app --port 8000 > uvicorn.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/health && break
            sleep 1
          done
        working-directory: server
      - name: Route matrix (fixture mode)
        run: python scripts/route_matrix.py --fixture --out route_matrix_report.md
        working-directory: server
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-matrix-report
          path: server/route_matrix_report.md
          if-no-files-found: ignore

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install
        working-directory: web
      - name: Test (with coverage)
        run: npm test -- --coverage
        working-directory: web
      - name: Coverage summary
        if: always()
        run: |
          if [ -f web/coverage/coverage-summary.json ]; then
            {
              echo "### Web coverage"
              node -e 'const t=require("./web/coverage/coverage-summary.json").total; for (const k of ["lines","statements","functions","branches"]) console.log(`- ${k}: ${t[k].pct}%`);'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: web/coverage
          if-no-files-found: ignore
      - name: Build
        run: npm run build
        working-directory: web
