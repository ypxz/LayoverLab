name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e "server[dev]"
      - name: Lint
        run: ruff check server
      - name: Test
        run: pytest server/tests -q
      - name: OpenAPI schema up to date
        run: |
          python server/scripts/export_openapi.py
          git diff --exit-code openapi.json

  prod-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build server prod image
        run: docker build -f server/Dockerfile.prod server
      - name: Build web prod image
        run: docker build -f web/Dockerfile.prod web

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install
        working-directory: web
      - name: Test
        run: npm test
        working-directory: web
      - name: Build
        run: npm run build
        working-directory: web
