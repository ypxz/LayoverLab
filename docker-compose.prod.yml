services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: layover
      POSTGRES_PASSWORD: layover
      POSTGRES_DB: layoverlab
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U layover -d layoverlab"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  api:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://layover:layover@db:5432/layoverlab
      RUN_SEEDS: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: ["python", "-m", "layoverlab.crawler.run"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://layover:layover@db:5432/layoverlab
      RUN_MIGRATIONS: "false"
    healthcheck:
      disable: true
    volumes:
      - httpcache:/app/.cache
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000/api}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  pgdata:
  httpcache:
